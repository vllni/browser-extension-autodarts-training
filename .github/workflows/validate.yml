name: Validate PR

on:
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check JS syntax
        run: node --check src/content.js

      - name: Run tests
        run: npm test -- --ci --reporters=default
